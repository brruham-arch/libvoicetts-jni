name: Build libvoicetts

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r25c
          add-to-path: true

      - name: Build with ndk-build
        run: |
          cd jni
          ndk-build NDK_PROJECT_PATH=.. NDK_APPLICATION_MK=Application.mk

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: libvoicetts-armeabi-v7a
          path: libs/armeabi-v7a/libvoicetts.so
